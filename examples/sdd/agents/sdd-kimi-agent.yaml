apiVersion: zima.io/v1
kind: Agent
metadata:
  code: sdd-kimi-agent
  name: SDD Kimi Agent
  description: SDD Kimi Agent，用于 research/clarify/plan/review
spec:
  type: kimi
  parameters:
    model: kimi-code/kimi-for-coding
    maxStepsPerTurn: 50
    maxRalphIterations: 10
    maxRetriesPerStep: 3
    yolo: true
    outputFormat: text
  defaults:
    env: sdd-env
createdAt: '2026-03-31T00:00:00Z'
updatedAt: '2026-03-31T00:00:00Z'
