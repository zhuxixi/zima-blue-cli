apiVersion: zima.io/v1
kind: Agent
metadata:
  code: sdd-implement-agent
  name: SDD Implement Agent
  description: Spec-Driven Development 实现 Agent，需要更高的 step 限制
spec:
  type: kimi
  parameters:
