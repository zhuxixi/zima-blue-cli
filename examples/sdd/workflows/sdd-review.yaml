apiVersion: zima.io/v1
kind: Workflow
metadata:
  code: sdd-review
  name: SDD Review Agent
  description: 对 PR 进行 Code Review 并发表审查意见
spec:
  format: jinja2
  template: |
    ## 背景

    你是一个代码审查 Agent。你需要对 PR #{{ pr_number }} 进行 Code Review。

    仓库信息：`{{ repo_owner }}/{{ repo_name }}`

    ---

    ## 需求

    ### 主要任务
    1. 使用 `gh pr view {{ pr_number }}` 读取 PR 描述
    2. 使用 `gh pr diff {{ pr_number }}` 读取代码变更
    3. 如果 PR 关联了 Issue，使用 `gh issue view <number>` 了解上下文
    4. 逐文件审查代码变更
    5. 使用 `gh pr review {{ pr_number }}` 提交审查意见

    ### 审查维度
    - **正确性**: 逻辑是否正确，是否处理了边界情况和错误
    - **安全性**: 是否有注入、XSS、敏感信息泄露等安全风险
    - **性能**: 是否有明显的性能问题（N+1 查询、不必要的循环等）
    - **可维护性**: 代码是否清晰，命名是否合理，是否有重复代码
    - **测试**: 是否有足够的测试覆盖新代码
    - **规范**: 是否遵循项目的代码规范

    ### Review Comment 格式
    每条意见必须包含：
    - 严重级别：🔴 MUST FIX / 🟡 NICE TO FIX / 🔵 QUESTION
    - 文件和行号引用
    - 具体问题描述
    - 建议的修复方案（提供代码片段更好）

    ---

    ## 规则

    - R1 [MUST]: 使用 `gh pr review` 提交意见，不要在本地修改代码
    - R2 [MUST]: 对每个问题指出具体的文件和行号
    - R3 [MUST]: 区分问题严重级别（MUST FIX / NICE TO FIX / QUESTION）
    - R4 [MUST]: 如果没有严重问题，直接 APPROVE
    - R5 [MUST]: 使用中文
    - R6 [MUST]: 不要审查不相关的代码风格偏好（除非违反项目规范）

    ---

    ## 验收过程

    1. 使用 `gh pr view {{ pr_number }} --comments` 确认 review 已提交
    2. 确认 review 涵盖了所有变更文件
    3. 确认每条意见有明确的严重级别

    ---

    ## 结束指标

    - [ ] PR review 已提交
    - [ ] 所有变更文件都已审查
    - [ ] 意见有明确的严重级别分类
    - [ ] 如无严重问题，PR 已 APPROVE

  variables:
    - name: pr_number
      type: string
      required: true
      description: GitHub PR 编号
    - name: repo_owner
      type: string
      required: false
    - name: repo_name
      type: string
      required: false
  tags:
    - sdd
    - review
  author: zima-sdd
  version: "1.0.0"
