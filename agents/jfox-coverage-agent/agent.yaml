# Agent 元数据
metadata:
  name: jfox-coverage-agent
  description: 提升 ZK-CLI 项目测试覆盖率

# Agent 配置
spec:
  # Workspace 工作目录
  workspace: ./workspace
  
  # Prompt 配置
  prompt:
    file: tasks/main.txt
    vars:
      project_path: "C:/Users/zhuzh/work/personal/jfox/zk-cli"
      target_coverage: 80
  
  # Kimi 执行参数
  execution:
    maxTime: 900              # 最大执行时间(秒)
    maxStepsPerTurn: 50       # 每轮最大步数
    maxRalphIterations: 10    # Ralph迭代次数
